<text x="263" y="316" text-anchor="middle" fill="#475569" font-size="11">written with skill</text>
<text x="215" y="338" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="600">Before v0.5</text>
<rect x="442" y="105" width="70" height="195" rx="3" fill="#dc2626"/>
<text x="477" y="99" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">7.63</text>
<text x="477" y="316" text-anchor="middle" fill="#475569" font-size="11">slop draft</text>
<rect x="538" y="298" width="70" height="2" rx="1" fill="#16a34a" opacity="0.45"/>
<text x="573" y="292" text-anchor="middle" fill="#64748b" font-size="12">0.00</text>
<text x="573" y="316" text-anchor="middle" fill="#475569" font-size="11">written with skill</text>
<text x="525" y="338" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="600">After v0.5 (marketing-aware)</text>
<text x="215" y="274" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">could not tell them apart</text>
